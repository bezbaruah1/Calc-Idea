<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
        <meta name="description" content="New Tech Calculator - A responsive and modern calculator application">
        <meta name="theme-color" content="#191b28">
        <title>New Tech Calculator</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
        <link rel="preload" href="CSS-Pages/home.css" as="style">
        <link rel="stylesheet" href="CSS-Pages/home.css">
    </head>
    <body>
        <header>
            <h1> Professional Laptop, Network & CCTV Support</h1>
        </header>
        <nav>
            <div id="menu">
              <ul>
                  <li class="active"><a href="index.html">Home</a></li>
                  <li><a href="Pages/About.html">About Me</a></li>
                  <li><a href="Pages/Products.html">Products</a></li>
                  <li><a href="Pages/Service.html">Service</a></li>
                  <li><a href="Pages/Contact.html">Contact</a></li>
              </ul>
            </div>
          </nav>
        
        <main>
            <div class="preview-controls">
                <button id="preview3DBtn" class="toggle-3d-btn">Enable 3D Preview</button>
            </div>
            
            <div id="perspective-container" class="perspective-container">
                <div class="calculator-container" id="calculatorElement">
                    <input class="display-box" type="text" id="result" disabled aria-label="Calculator display" />
                    
                    <div class="buttons-grid">
                    <button class="button btn-clear" id="clearBtn" type="button">C</button>
                    <button class="button" type="button" data-op="/">/</button>
                    <button class="button" type="button" data-op="*">*</button>
                    <button class="button" type="button" data-op="-">-</button>
                    
                    <button class="button" type="button" data-num="7">7</button>
                    <button class="button" type="button" data-num="8">8</button>
                    <button class="button" type="button" data-num="9">9</button>
                    <button class="button" type="button" data-op="+">+</button>
                    
                    <button class="button" type="button" data-num="4">4</button>
                    <button class="button" type="button" data-num="5">5</button>
                    <button class="button" type="button" data-num="6">6</button>
                    <button class="button btn-decimal" type="button" data-num=".">.</button>
                    
                    <button class="button" type="button" data-num="1">1</button>
                    <button class="button" type="button" data-num="2">2</button>
                    <button class="button" type="button" data-num="3">3</button>
                    <button class="button btn-equals" id="equalsBtn" type="button">=</button>
                    
                    <button class="button btn-zero" type="button" data-num="0">0</button>
                </div>
            </div>
            </div>
        </main>
        
        <script src="default.js" defer></script>  
    </body>
</html>
