<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Contact Me - Get in touch with the calculator designer">
        <title>Contact Me</title>
        <link rel="stylesheet" href="../CSS-Pages/cont.css">
        <link rel="stylesheet" href="../CSS-Pages/header3d.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <header>
            <div class="header-inner">
                <h1>Contact Me</h1>
                <button class="toggle-3d-btn" aria-pressed="false" title="Toggle 3D header">3D</button>
            </div>
        </header>
        <nav>
            <div id="menu">
              <ul>
                  <li><a href="../index.html">Home</a></li>
                  <li><a href="About.html">About Me</a></li>
                  <li><a href="Products.html">Products</a></li>
                  <li><a href="Service.html">Service</a></li>
                  <li class="active"><a href="Contact.html">Contact</a></li>
              </ul>
            </div>
        </nav>
        
        <main>
            <div class="container">
                <div class="formWraper">
                    <div class="formDiv">
                        <h2>Create Account</h2>
                        <p>Sign Up with Social Media</p>
                        
                        <div class="socialBtn">
                            <a href="#facebook" class="icon facebook" aria-label="Facebook" title="Facebook">
                                <i class="fab fa-facebook-f"></i>
                            </a>
                            <a href="#twitter" class="icon twitter" aria-label="Twitter" title="Twitter">
                                <i class="fab fa-twitter"></i>
                            </a>
                            <a href="#instagram" class="icon instagram" aria-label="Instagram" title="Instagram">
                                <i class="fab fa-instagram"></i>
                            </a>
                        </div>
                        
                        <hr>
                        <p style="text-align: center; margin: 15px 0; color: #999;">Or</p>
                        
                        <p>Sign Up with Email Address</p>
                        <form>
                            <div class="formGroup">
                                <label for="name">Name</label>
                                <input type="text" name="name" id="name" placeholder="Your Name" required>
                            </div>
                            <div class="formGroup">
                                <label for="email">Email</label>
                                <input type="email" name="email" id="email" placeholder="Your Email" required>
                            </div>
                            <div class="formGroup">
                                <label for="password">Password</label>
                                <input type="password" name="password" id="password" placeholder="Your Password" required>
                            </div>
                            <div class="checkBox">
                                <input type="checkbox" name="checkbox" id="checkbox" required>
                                <label for="checkbox">I Agree with Terms & Conditions</label>
                            </div>
                            <button type="submit" class="btn">SIGN UP</button>
                        </form>
                    </div>
                    
                    <div class="welcomeDiv">
                        <h2>Welcome Friends!</h2>
                        <p>Get in touch with us for updates.</p>
                        <button class="btn2" onclick="alert('Redirecting to sign in...')">SIGN IN</button>
                    </div>
                </div>
            </div>
        </main>
        <script src="../js/header3d.js" defer></script>
    </body>
</html>
